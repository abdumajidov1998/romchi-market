databases:
  - name: romchi-db
    plan: free
    databaseName: romchi
    user: romchi

services:
  - type: web
    name: romchi-backend
    runtime: docker
    dockerfilePath: ./backend-java/Dockerfile
    dockerContext: ./backend-java
    plan: free
    envVars:
      - key: PORT
        value: "3001"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://romchi-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: romchi-db
          property: connectionString

  - type: web
    name: romchi-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: BACKEND_ORIGIN
        value: https://romchi-backend.onrender.com
