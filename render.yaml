databases:
  - name: romchi-db
    plan: free
    databaseName: romchi
    user: romchi

services:
  - type: web
    name: romchi-market
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: romchi-db
          property: connectionString
